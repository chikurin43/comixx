<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComixX | ログイン</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <a class="brand" href="index.html">ComixX</a>
        <ul>
          <li><a href="login.html">ログイン</a></li>
          <li><a href="main.html">メイン</a></li>
          <li><a href="palette.html">パレット</a></li>
          <li><a href="mypage.html">マイページ</a></li>
        </ul>
      </nav>
    </header>

    <main class="split">
      <section class="panel">
        <h1>ログイン</h1>
        <form>
          <label>
            メールアドレス
            <input type="email" placeholder="you@example.com" />
          </label>
          <label>
            パスワード
            <input type="password" placeholder="••••••••" />
          </label>
          <button class="button" type="button">ログイン</button>
        </form>
      </section>

      <section class="panel">
        <h2>アカウント作成</h2>
        <form>
          <label>
            ユーザー名
            <input type="text" placeholder="ComixXユーザー" />
          </label>
          <label>
            メールアドレス
            <input type="email" placeholder="new@example.com" />
          </label>
          <label>
            パスワード
            <input type="password" placeholder="8文字以上" />
          </label>
          <button class="button secondary" type="button">新規登録</button>
        </form>
      </section>
    </main>
  </body>
</html>
