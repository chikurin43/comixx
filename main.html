<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComixX | メイン</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <a class="brand" href="index.html">ComixX</a>
        <ul>
          <li><a href="login.html">ログイン</a></li>
          <li><a href="main.html">メイン</a></li>
          <li><a href="palette.html">パレット</a></li>
          <li><a href="mypage.html">マイページ</a></li>
        </ul>
      </nav>
    </header>

    <main class="split">
      <section class="panel">
        <h1>パレットを作成</h1>
        <form>
          <label>
            パレット名
            <input type="text" placeholder="例：学園SF編" />
          </label>
          <label>
            ジャンル
            <select>
              <option>バトル</option>
              <option>ラブコメ</option>
              <option>SF</option>
              <option>ホラー</option>
            </select>
          </label>
          <label>
            説明
            <textarea placeholder="このパレットで作りたい作品の方向性"></textarea>
          </label>
          <button class="button" type="button">作成する</button>
        </form>
      </section>

      <section class="panel">
        <h2>公開中のパレット一覧</h2>
        <div class="list">
          <article class="card">
            <h3>学園SFミステリー</h3>
            <p class="small">参加者 12名 / 最新投票: 主人公の正体</p>
            <a class="button secondary" href="palette.html">参加する</a>
          </article>
          <article class="card">
            <h3>関西弁ヒーロー日常譚</h3>
            <p class="small">参加者 8名 / 最新投票: 新キャラ登場回</p>
            <a class="button secondary" href="palette.html">参加する</a>
          </article>
          <article class="card">
            <h3>深海コロニー冒険記</h3>
            <p class="small">参加者 20名 / 最新投票: 第3話ラストの展開</p>
            <a class="button secondary" href="palette.html">参加する</a>
          </article>
        </div>
      </section>
    </main>
  </body>
</html>
