<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ComixX | パレットページ</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header>
      <nav>
        <a class="brand" href="index.html">ComixX</a>
        <ul>
          <li><a href="login.html">ログイン</a></li>
          <li><a href="main.html">メイン</a></li>
          <li><a href="palette.html">パレット</a></li>
          <li><a href="mypage.html">マイページ</a></li>
        </ul>
      </nav>
    </header>

    <main>
      <section class="panel">
        <h1>パレット：学園SFミステリー</h1>
        <p class="small">チャットで議論 → 投票 → 漫画投稿 の流れをこの画面で完結できます。</p>

        <div class="tabs" role="tablist" aria-label="パレット機能">
          <button class="tab active" data-tab="chat" type="button">チャット</button>
          <button class="tab" data-tab="post" type="button">漫画投稿</button>
          <button class="tab" data-tab="view" type="button">閲覧</button>
        </div>

        <div class="tab-panel active" id="chat">
          <div class="card">
            <h2>チャット欄</h2>
            <p class="small">[仮UI] Supabase Realtime を想定したメッセージ表示領域</p>
            <div class="list">
              <p>🗨️ A: 次回は転校生を出したい！</p>
              <p>🗨️ B: 伏線回収を先にしたいので投票しましょう。</p>
            </div>
            <form>
              <textarea placeholder="メッセージを入力"></textarea>
              <button type="button" class="button">送信</button>
            </form>
          </div>
        </div>

        <div class="tab-panel" id="post">
          <div class="card">
            <h2>漫画投稿ページ</h2>
            <form>
              <label>
                話数タイトル
                <input type="text" placeholder="第4話：謎の転校生" />
              </label>
              <label>
                画像ファイル
                <input type="file" />
              </label>
              <label>
                補足メモ
                <textarea placeholder="あらすじや見どころ"></textarea>
              </label>
              <button type="button" class="button">投稿する</button>
            </form>
          </div>
        </div>

        <div class="tab-panel" id="view">
          <div class="card">
            <h2>漫画閲覧ページ</h2>
            <p>最新投稿：第3話「地下書庫の鍵」</p>
            <p class="small">[仮UI] 画像ビューアやページ送りは後続実装</p>
            <div style="height: 200px; border: 1px dashed var(--border); border-radius: 10px; display:grid; place-items:center; color: var(--muted);">
              漫画プレビューエリア
            </div>
          </div>
        </div>
      </section>
    </main>

    <script>
      const tabs = document.querySelectorAll('.tab');
      const panels = document.querySelectorAll('.tab-panel');

      tabs.forEach((tab) => {
        tab.addEventListener('click', () => {
          tabs.forEach((t) => t.classList.remove('active'));
          panels.forEach((p) => p.classList.remove('active'));

          tab.classList.add('active');
          const target = document.getElementById(tab.dataset.tab);
          if (target) target.classList.add('active');
        });
      });
    </script>
  </body>
</html>
